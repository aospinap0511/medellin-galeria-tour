<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería Real | Medellín Galería Tour</title>
  <meta name="description" content="Nuestra galería de fotos de las experiencias en Medellín. Fotografías reales de viajeros reales.">
  <link rel="icon" type="image/png" href="/images/logo_3.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .page-header { padding: 120px 24px 60px; background: var(--bg-subtle); text-align: center; }
    .page-title { font-family: var(--font-display); font-size: 3rem; color: var(--text-dark); margin-bottom: 16px; text-transform: uppercase; }
    .full-gallery { max-width: 1280px; margin: 0 auto; padding: 60px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .gallery-item { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-light); box-shadow: var(--shadow-md); height: 300px; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.05); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="/" class="brand-logo">
        <img src="/images/logo_3.png" alt="Logo">
        <div class="brand-name">
          <span class="title-main">MEDELLÍN GALERÍA</span>
          <span class="title-sub">HISTORIAS & TOURS</span>
        </div>
      </a>
      <div style="display: flex; align-items: center; gap: 16px;">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button id="drawer-open" class="mobile-toggle" style="display: block; background: transparent; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-dark);" aria-label="Menu" aria-expanded="false" aria-controls="drawer">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="page-header">
    <span class="section-tag" data-i18n="galleryTag2">Visuales</span>
    <h1 class="page-title" data-i18n="galleryTitle2">Galería Completa</h1>
    <p style="color: var(--text-muted); font-size: 1.1rem;" data-i18n="galleryDesc2">Nuestra comunidad y nuestros viajeros a través del lente.</p>
  </div>

  <div class="full-gallery">
    <!-- Using available real images -->
    <div class="gallery-item"><img src="/images/hero_real.jpg" alt="Hero Real"></div>
    <div class="gallery-item"><img src="/images/comuna13_real.jpg" alt="Comuna 13"></div>
    <div class="gallery-item"><img src="/images/coffee_real.jpg" alt="Café"></div>
    <div class="gallery-item"><img src="/images/city_real.jpg" alt="City Tour"></div>
    <div class="gallery-item"><img src="/images/travelers_real.jpg" alt="Viajeros"></div>
    <div class="gallery-item"><img src="/images/gallery_1.jpg" alt="Galería 1"></div>
    <div class="gallery-item"><img src="/images/gallery_2.jpg" alt="Galería 2"></div>
    <div class="gallery-item"><img src="/images/gallery_3.jpg" alt="Galería 3"></div>
  </div>

  <div class="Drawer" id="drawer" popover="manual">
    <div class="Drawer-scroller">
      <nav class="Drawer-sheet" tabindex="-1">
        <div class="drawer-header">
          <img src="/images/logo_3.png" alt="Logo" class="drawer-logo">
          <button class="drawer-close" aria-label="Cerrar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="drawer-links">
          <li><a href="/index.html#tours" data-i18n="navTours">Experiencias</a></li>
          <li><a href="/about.html" data-i18n="navAbout">La Historia</a></li>
          <li><a href="/gallery.html" data-i18n="navGallery">Galería Real</a></li>
          <li><a href="/reviews.html" data-i18n="navReviews">Reseñas</a></li>
          <li><a href="/index.html#booking" data-i18n="navContact">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-bottom">
      <p data-i18n="footerCopy">&copy; 2026 Medellín Galería Tour. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="/main.js"></script>
</body>
</html>
